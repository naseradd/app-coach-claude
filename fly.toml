app = "coach-claude"
primary_region = "yyz"

[build]
  dockerfile = "packages/server/Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/coach.db"
  STATIC_DIR = "dist-web"
  NODE_ENV = "production"

[mounts]
  source = "coach_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
