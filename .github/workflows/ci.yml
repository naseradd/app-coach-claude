name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Build shared first so server/web typecheck can resolve @coach/shared types
      - run: pnpm --filter @coach/shared build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
